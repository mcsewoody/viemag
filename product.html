<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — VIEMAG</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="products" data-keep-title="1">

<main>
  <div class="container">
    <nav class="breadcrumbs" id="crumbs" aria-label="Breadcrumb"></nav>
    <div id="pdp"></div>
    <section class="pdp-section" id="relatedWrap" style="display:none">
      <h2 data-i18n="pdp.related"></h2>
      <div class="prod-grid" id="relatedGrid"></div>
    </section>
  </div>
</main>

<script src="js/data.js"></script>
<script src="js/i18n.js"></script>
<script>
window.renderPage = function ({ t, tf, icon, art, thumb, productCard, catById, scnByCode, esc, stars, money }) {
  const DB = window.DB;
  const sku = new URLSearchParams(location.search).get('sku');
  const p = DB.products.find((x) => x.sku === sku) || DB.products[0];
  const box = document.getElementById('pdp');
  if (!p) { box.innerHTML = `<div class="empty-state">${t('pdp.notFound')}</div>`; return; }

  const cat = catById(p.category);
  document.title = `${tf(p.name)} — VIEMAG`;
  document.getElementById('crumbs').innerHTML =
    `<a href="index.html">VIEMAG</a><span>/</span>` +
    `<a href="products.html">${t('nav.products')}</a><span>/</span>` +
    `<a href="products.html?cat=${cat.id}">${esc(tf(cat.name))}</a><span>/</span><span>${esc(tf(p.name))}</span>`;

  const future = p.status === 'future';
  const scnChips = (p.scenarios || []).map((code) => {
    const s = scnByCode(code);
    return s ? `<a class="chip" href="scenarios.html#${s.id}">${s.code} · ${esc(tf(s.name))}</a>` : '';
  }).join(' ');

  /* Highlights: claim + per-type generic engineering bullets (mock copy) */
  const hl = [];
  hl.push(tf(p.claim));
  if (p.qi !== 'none') hl.push(t('qi.' + p.qi));
  if ((p.mount || []).length) hl.push(`${t('pdp.spec.mount')}: ${(p.mount).map((m) => t('mount.' + m)).join(' · ')}`);
  hl.push(t('pdp.warranty'));

  const specRows = [
    [t('pdp.spec.sku'), p.sku],
    [t('pdp.spec.mount'), (p.mount || []).map((m) => t('mount.' + m)).join(' · ') || '—'],
    [t('pdp.spec.watt'), p.watt || '—'],
    [t('pdp.spec.qi'), t('qi.' + (p.qi || 'none'))]
  ].map(([k, v]) => `<tr><td>${k}</td><td>${esc(v)}</td></tr>`).join('');

  box.innerHTML = `
  <div class="pdp">
    <div class="pdp-gallery">
      <div class="main">${thumb(p)}</div>
    </div>
    <div class="pdp-info">
      <span class="sku">${esc(tf(cat.name))} · ${p.sku}</span>
      <h1>${esc(tf(p.name))}</h1>
      ${p.rating ? `<div class="rating"><span class="stars" aria-hidden="true">${stars(p.rating)}</span><b>${p.rating.toFixed(1)}</b><span>(${p.reviews})</span></div>` : ''}
      <p class="claim">${esc(tf(p.claim))}</p>
      <div class="meta-chips">${scnChips}</div>
      ${future
        ? `<div class="notice" style="margin:20px 0">${t('cats.soon')}</div>`
        : `<div class="price">${money(p.price)}</div>
           <div class="pdp-ctas">
             <a class="btn btn-primary" href="${DB.config.shopeeUrl}" target="_blank" rel="noopener">${t('cta.shopee')}</a>
             <a class="btn btn-ghost" href="dealers.html">${t('pdp.askDealer')}</a>
           </div>`}
      <ul class="bullet-list" aria-label="${t('pdp.highlights')}">
        ${hl.map((x) => `<li>${icon('check')}<span>${esc(x)}</span></li>`).join('')}
      </ul>
      <div class="spec-block">
        <h3>${t('pdp.specs')}</h3>
        <table>${specRows}</table>
      </div>
      <div class="spec-block">
        <h3>${t('pdp.compat')}</h3>
        <table><tr><td colspan="2" style="color:var(--ink)">${t('pdp.compatText')}</td></tr></table>
      </div>
      <div class="spec-block">
        <h3>${t('pdp.evidence')}</h3>
        <table><tr><td colspan="2" style="color:var(--muted)">${t('pdp.evidenceNote')}</td></tr></table>
      </div>
    </div>
  </div>`;

  /* related: same primary scenario, exclude self */
  const rel = DB.products.filter((x) => x.sku !== p.sku && x.status === 'published' &&
    (x.scenarios || []).some((s) => (p.scenarios || []).includes(s))).slice(0, 4);
  if (rel.length) {
    document.getElementById('relatedWrap').style.display = '';
    document.getElementById('relatedGrid').innerHTML = rel.map(productCard).join('');
  }
};
</script>
<script src="js/main.js"></script>
</body>
</html>
