<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — VIEMAG</title>
  <meta name="description" content="Browse the full VIEMAG magnetic accessory lineup: car mounts, Qi2-standard charging mounts, desk and travel chargers, magnetic accessories.">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="products">

<main>
  <section class="page-hero">
    <div class="container">
      <h1 data-i18n="products.title"></h1>
      <p data-i18n="products.sub"></p>
    </div>
  </section>

  <section class="section-tight">
    <div class="container">
      <p class="filter-label" data-i18n="filter.byCat"></p>
      <div class="filter-bar" id="catFilter"></div>
      <p class="filter-label" data-i18n="filter.byScn"></p>
      <div class="filter-bar" id="scnFilter"></div>
      <div class="prod-grid" id="prodGrid" style="margin-top:24px"></div>
      <div class="empty-state" id="emptyState" style="display:none" data-i18n="products.empty"></div>
    </div>
  </section>
</main>

<script src="js/data.js"></script>
<script src="js/i18n.js"></script>
<script>
window.renderPage = function ({ t, tf, productCard }) {
  const DB = window.DB;
  const params = new URLSearchParams(location.search);
  let curCat = params.get('cat') || 'all';
  let curScn = params.get('scn') || 'all';

  const catBar = document.getElementById('catFilter');
  const scnBar = document.getElementById('scnFilter');
  const grid = document.getElementById('prodGrid');
  const empty = document.getElementById('emptyState');

  function drawFilters() {
    catBar.innerHTML = `<button data-v="all" class="${curCat === 'all' ? 'active' : ''}">${t('filter.all')}</button>` +
      DB.categories.map((c) =>
        `<button data-v="${c.id}" class="${curCat === c.id ? 'active' : ''}">${tf(c.name)}</button>`).join('');
    scnBar.innerHTML = `<button data-v="all" class="${curScn === 'all' ? 'active' : ''}">${t('filter.all')}</button>` +
      DB.scenarios.map((s) =>
        `<button data-v="${s.code}" class="${curScn === s.code ? 'active' : ''}">${s.code} · ${tf(s.name)}</button>`).join('');
    catBar.querySelectorAll('button').forEach((b) => b.onclick = () => { curCat = b.dataset.v; sync(); });
    scnBar.querySelectorAll('button').forEach((b) => b.onclick = () => { curScn = b.dataset.v; sync(); });
  }

  function sync() {
    const p = new URLSearchParams();
    if (curCat !== 'all') p.set('cat', curCat);
    if (curScn !== 'all') p.set('scn', curScn);
    history.replaceState(null, '', 'products.html' + (p.toString() ? '?' + p : ''));
    drawFilters(); draw();
  }

  function draw() {
    const list = DB.products.filter((p) =>
      (curCat === 'all' || p.category === curCat) &&
      (curScn === 'all' || (p.scenarios || []).includes(curScn)));
    /* published first, future last */
    list.sort((a, b) => (a.status === 'future') - (b.status === 'future'));
    grid.innerHTML = list.map(productCard).join('');
    empty.style.display = list.length ? 'none' : 'block';
  }

  drawFilters(); draw();
};
</script>
<script src="js/main.js"></script>
</body>
</html>
