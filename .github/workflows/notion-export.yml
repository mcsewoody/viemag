name: Export Notion → data.js

# Pulls content from the VIEMAG 後台 Notion workspace and regenerates
# js/data.js, committing the change so GitHub Pages redeploys.
#
# Trigger: manually (Actions tab → Run workflow) or on a daily schedule.
# Requires repo secret NOTION_TOKEN (a Notion internal integration token
# with access to the 「VIEMAG 後台」 page). See scripts/README.md.

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 0,12 * * *'   # every 12h at 00:00 & 12:00 UTC (08:00 & 20:00 Taiwan)

permissions:
  contents: write

concurrency:
  group: notion-export
  cancel-in-progress: true

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0          # full history so `git pull --rebase` works

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Export from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node scripts/export-notion.mjs

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain js/data.js)" ]]; then
            git config user.name  "viemag-bot"
            git config user.email "actions@users.noreply.github.com"
            git add js/data.js
            git commit -m "Sync js/data.js from Notion [skip ci]"
            for i in 1 2 3; do
              if git pull --rebase origin "${GITHUB_REF_NAME}" && git push; then
                exit 0
              fi
              echo "push attempt $i rejected (concurrent sync), retrying in 3s…"
              sleep 3
            done
            echo "::error::push failed after 3 attempts"
            exit 1
          else
            echo "No changes."
          fi
